name: Python wheels

on:
  pull_request:
  push:
    tags:
      - "camera-geometry-v*"
  workflow_dispatch:

jobs:
  wheels:
    name: ${{ matrix.os }} wheel
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release --out dist
          manylinux: auto
          working-directory: crates/camera-geometry-python
      - name: Install wheel
        shell: bash
        working-directory: crates/camera-geometry-python
        run: python -m pip install --force-reinstall dist/*.whl
      - name: Smoke test
        working-directory: crates/camera-geometry-python
        run: python tests/smoke.py
      - uses: actions/upload-artifact@v4
        with:
          name: camera-geometry-${{ matrix.os }}
          path: crates/camera-geometry-python/dist/*.whl
